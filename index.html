<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pozicija Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111318;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #555;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .dot.connected { background: #7ef7a0; }
    .dot.error     { background: #f97; }

    #canvas {
      border: 1px solid #2a2d35;
      border-radius: 8px;
      cursor: none;
      display: block;
    }

    #info {
      font-size: 11px;
      color: #444;
    }
  </style>
</head>
<body>

  <div id="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Nije konektovan...</span>
  </div>

  <canvas id="canvas" width="800" height="500"></canvas>

  <div id="info">Pomeri miša po canvasu — pozicija se šalje serveru</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const WORLD  = 4000;

    let myId   = null;
    let igraci = [];

    // ── WebSocket ─────────────────────────────────────────────
    const ws = new WebSocket('ws://localhost:8765');

    ws.onopen = () => {
      setStatus('connected', 'Konektovan');
      ws.send(JSON.stringify({ type: 'join', ime: 'TestIgrac' }));
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'welcome') {
        myId = data.id;
      }

      if (data.type === 'game_state') {
        igraci = data.igraci;
      }
    };

    ws.onerror = () => setStatus('error', 'Greška pri konekciji');
    ws.onclose = () => setStatus('', 'Diskonektovan');

    function setStatus(state, text) {
      const dot = document.getElementById('dot');
      dot.className = 'dot' + (state ? ' ' + state : '');
      document.getElementById('status-text').textContent = text;
    }

    // ── Slanje pozicije miša serveru (world koordinate) ───────
    canvas.addEventListener('mousemove', (e) => {
      if (ws.readyState !== WebSocket.OPEN) return;

      const rect = canvas.getBoundingClientRect();
      const x = Math.round((e.clientX - rect.left) / canvas.width * WORLD);
      const y = Math.round((e.clientY - rect.top) / canvas.height * WORLD);

      ws.send(JSON.stringify({ type: 'move', x, y }));
    });

    // ── Crtanje ───────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Pozadina
      ctx.fillStyle = '#111318';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Grid
      ctx.strokeStyle = '#1a1d24';
      ctx.lineWidth = 1;
      for (let x = 0; x < canvas.width; x += 40) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += 40) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke();
      }

      // Skaliranje world → canvas
      const scaleX = canvas.width / WORLD;
      const scaleY = canvas.height / WORLD;

      // Crtaj svakog igraca
      for (const igrac of igraci) {
        const jesMoj = igrac.id === myId;

        for (const cell of igrac.cells) {
          const sx = cell.x * scaleX;
          const sy = cell.y * scaleY;
          const sr = Math.max(cell.r * scaleX, 3);

          // Krug
          ctx.beginPath();
          ctx.arc(sx, sy, sr, 0, Math.PI * 2);
          ctx.fillStyle = jesMoj ? '#7ef7a0' : '#5ba3f5';
          ctx.fill();

          // Border
          ctx.strokeStyle = jesMoj ? '#4ab870' : '#3a6fa8';
          ctx.lineWidth = 2;
          ctx.stroke();

          // Ime iznad
          ctx.fillStyle = '#fff';
          ctx.font = '12px Courier New';
          ctx.textAlign = 'center';
          ctx.fillText(igrac.ime, sx, sy - sr - 6);

          // Koordinate ispod
          ctx.fillStyle = '#555';
          ctx.font = '10px Courier New';
          ctx.fillText(`${Math.round(cell.x)}, ${Math.round(cell.y)}`, sx, sy + sr + 14);
        }
      }

      // Legenda
      ctx.textAlign = 'left';
      ctx.fillStyle = '#7ef7a0';
      ctx.font = '11px Courier New';
      ctx.fillText('● Ti', 12, 20);
      ctx.fillStyle = '#5ba3f5';
      ctx.fillText('● Ostali', 12, 36);

      ctx.fillStyle = '#333';
      ctx.fillText(`Igraca: ${igraci.length}`, canvas.width - 80, 20);

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
