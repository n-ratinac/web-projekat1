<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pozicija Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111318;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
    }

    #status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #555;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }
    .dot.connected { background: #7ef7a0; }
    .dot.error     { background: #f97; }

    #canvas {
      border: 1px solid #2a2d35;
      border-radius: 8px;
      display: block;
    }

    #info {
      font-size: 11px;
      color: #444;
    }

    #name-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #name-box {
      background: #1a1d24;
      border: 1px solid #2a2d35;
      border-radius: 12px;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      min-width: 300px;
    }

    #name-box h2 {
      font-size: 20px;
      color: #7ef7a0;
      letter-spacing: 2px;
    }

    #name-input {
      background: #111318;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 15px;
      padding: 10px 16px;
      width: 100%;
      outline: none;
      text-align: center;
    }

    #name-input:focus {
      border-color: #7ef7a0;
    }

    #play-btn {
      background: #7ef7a0;
      color: #111318;
      border: none;
      border-radius: 6px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      font-weight: bold;
      padding: 10px 32px;
      cursor: pointer;
      letter-spacing: 1px;
      width: 100%;
    }

    #play-btn:hover {
      background: #5bd680;
    }
  </style>
</head>
<body>

  <div id="name-overlay">
    <div id="name-box">
      <h2>AGAR.IO</h2>
      <input type="text" id="name-input" placeholder="Unesite vaše ime..." maxlength="20" />
      <button id="play-btn">IGRAJ</button>
    </div>
  </div>

  <div id="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">Nije konektovan...</span>
  </div>

  <canvas id="canvas" width="800" height="500"></canvas>

  <div id="info">Pomeri miša po canvasu — pozicija se šalje serveru</div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');
    const WORLD  = 4000;

    let myId       = null;
    let igraci     = [];
    let hrana      = [];
    let playerName = '';
    let ws         = null;
    let cameraX    = WORLD / 2;
    let cameraY    = WORLD / 2;
    const VIEWPORT_W = 800; // world units vidljivo horizontalno

    // ── Name overlay ──────────────────────────────────────────
    const overlay   = document.getElementById('name-overlay');
    const nameInput = document.getElementById('name-input');
    const playBtn   = document.getElementById('play-btn');

    function startGame() {
      const raw = nameInput.value.trim();
      playerName = raw.length > 0 ? raw : 'Igrac';
      overlay.style.display = 'none';
      connectWS();
    }

    playBtn.addEventListener('click', startGame);
    nameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') startGame();
    });

    // ── WebSocket ─────────────────────────────────────────────
    function connectWS() {
      ws = new WebSocket('ws://127.0.0.1:8765');

    ws.onopen = () => {
      setStatus('connected', 'Konektovan');
      ws.send(JSON.stringify({ type: 'join', ime: playerName }));
    };

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'welcome') {
        myId = data.id;
      }

      if (data.type === 'game_state') {
        igraci = data.igraci;
        hrana  = data.hrana;
      }
    };

    ws.onerror = () => setStatus('error', 'Greška pri konekciji');
    ws.onclose = () => setStatus('', 'Diskonektovan');
    } // connectWS

    function setStatus(state, text) {
      const dot = document.getElementById('dot');
      dot.className = 'dot' + (state ? ' ' + state : '');
      document.getElementById('status-text').textContent = text;
    }

    // ── Slanje pozicije miša serveru (world koordinate) ───────
    canvas.addEventListener('mousemove', (e) => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      const zoom = canvas.width / VIEWPORT_W;
      const rect = canvas.getBoundingClientRect();
      const x = Math.round((e.clientX - rect.left - canvas.width  / 2) / zoom + cameraX);
      const y = Math.round((e.clientY - rect.top  - canvas.height / 2) / zoom + cameraY);
      ws.send(JSON.stringify({ type: 'move', x, y }));
    });

    // ── Crtanje ───────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#111318';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Kamera prati mog igrača
      const myPlayer = igraci.find(ig => ig.id === myId);
      if (myPlayer && myPlayer.cells.length > 0) {
        cameraX = myPlayer.cells[0].x;
        cameraY = myPlayer.cells[0].y;
      }

      const zoom = canvas.width / VIEWPORT_W;

      ctx.save();
      ctx.translate(canvas.width / 2, canvas.height / 2);
      ctx.scale(zoom, zoom);
      ctx.translate(-cameraX, -cameraY);

      // Grid u world koordinatama
      const gridStep = 200;
      ctx.strokeStyle = '#1a1d24';
      ctx.lineWidth = 1 / zoom;
      for (let gx = 0; gx <= WORLD; gx += gridStep) {
        ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, WORLD); ctx.stroke();
      }
      for (let gy = 0; gy <= WORLD; gy += gridStep) {
        ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(WORLD, gy); ctx.stroke();
      }

      // Granica mape
      ctx.strokeStyle = '#2a2d35';
      ctx.lineWidth = 6 / zoom;
      ctx.strokeRect(0, 0, WORLD, WORLD);

      // Hrana
      for (const pellet of hrana) {
        ctx.beginPath();
        ctx.arc(pellet.x, pellet.y, 6 / zoom, 0, Math.PI * 2);
        ctx.fillStyle = `hsl(${pellet.hue}, 80%, 60%)`;
        ctx.fill();
      }

      // Igrači i botovi
      for (const igrac of igraci) {
        const jesMoj = igrac.id === myId;
        for (const cell of igrac.cells) {
          ctx.beginPath();
          ctx.arc(cell.x, cell.y, cell.r, 0, Math.PI * 2);
          ctx.fillStyle = jesMoj ? '#7ef7a0' : `hsl(${igrac.hue ?? 210}, 70%, 60%)`;
          ctx.fill();
          ctx.strokeStyle = jesMoj ? '#4ab870' : `hsl(${igrac.hue ?? 210}, 70%, 40%)`;
          ctx.lineWidth = 2 / zoom;
          ctx.stroke();

          // Ime u centru ako je dovoljno velika na ekranu
          const screenR = cell.r * zoom;
          if (screenR > 12) {
            const fontSize = screenR * 0.5;
            ctx.font = `bold ${fontSize / zoom}px Courier New`;
            ctx.fillStyle = 'rgba(255,255,255,0.9)';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(igrac.ime, cell.x, cell.y);
            ctx.textBaseline = 'alphabetic';
          }
        }
      }

      ctx.restore();

      // UI — screen space
      ctx.textAlign = 'left';
      ctx.textBaseline = 'alphabetic';
      ctx.fillStyle = '#7ef7a0';
      ctx.font = '11px Courier New';
      ctx.fillText('● Ti', 12, 20);
      ctx.fillStyle = '#5ba3f5';
      ctx.fillText('● Ostali', 12, 36);
      ctx.fillStyle = '#444';
      ctx.textAlign = 'right';
      ctx.fillText(`Igraca: ${igraci.length}`, canvas.width - 12, 20);

      requestAnimationFrame(draw);
    }

    draw();
  </script>
</body>
</html>
