<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebSocket Test Klijent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111318;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      color: #7ef7a0;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }

    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0.75rem 1rem;
      background: #1a1d24;
      border-radius: 8px;
      border: 1px solid #2a2d35;
      margin-bottom: 1rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #555;
      flex-shrink: 0;
    }

    .dot.connected { background: #7ef7a0; }
    .dot.error { background: #f97; }

    .status-text {
      font-size: 13px;
      color: #888;
    }

    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 1rem;
    }

    .controls input {
      flex: 1;
      background: #1a1d24;
      border: 1px solid #2a2d35;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      outline: none;
    }

    .controls input:focus {
      border-color: #7ef7a0;
    }

    button {
      background: #1a1d24;
      color: #e0e0e0;
      border: 1px solid #2a2d35;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
    }

    button:hover:not(:disabled) {
      background: #22252e;
      border-color: #7ef7a0;
      color: #7ef7a0;
    }

    button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .log-label {
      font-size: 11px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .btn-clear {
      font-size: 11px;
      color: #555;
      border: none;
      background: none;
      cursor: pointer;
      padding: 0;
      font-family: 'Courier New', monospace;
    }

    .btn-clear:hover {
      color: #888;
    }

    .log-box {
      background: #1a1d24;
      border: 1px solid #2a2d35;
      border-radius: 8px;
      height: 300px;
      overflow-y: auto;
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 12px;
      line-height: 1.9;
    }

    .log-box::-webkit-scrollbar { width: 4px; }
    .log-box::-webkit-scrollbar-track { background: transparent; }
    .log-box::-webkit-scrollbar-thumb { background: #2a2d35; border-radius: 4px; }

    .log-entry {
      display: flex;
      gap: 12px;
    }

    .log-time { color: #444; flex-shrink: 0; }
    .log-msg { }
    .log-msg.out { color: #5ba3f5; }
    .log-msg.in  { color: #7ef7a0; }
    .log-msg.err { color: #f97; }
    .log-msg.sys { color: #666; font-style: italic; }

    .send-row {
      display: flex;
      gap: 8px;
    }

    .send-row input {
      flex: 1;
      background: #1a1d24;
      border: 1px solid #2a2d35;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      font-size: 13px;
      padding: 8px 12px;
      border-radius: 8px;
      outline: none;
    }

    .send-row input:focus {
      border-color: #7ef7a0;
    }

    .send-row input::placeholder { color: #444; }
    .controls input::placeholder { color: #444; }
  </style>
</head>
<body>
  <div class="container">
    <h1>WebSocket Test Klijent</h1>

    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="status-text">Nije konektovan</span>
    </div>

    <div class="controls">
      <input type="text" id="url-input" value="ws://localhost:8765" placeholder="ws://localhost:8765" />
      <button id="btn-connect" onclick="connect()">Konektuj</button>
      <button id="btn-disconnect" onclick="disconnect()" disabled>Diskonektuj</button>
    </div>

    <div class="log-header">
      <span class="log-label">Log</span>
      <button class="btn-clear" onclick="clearLog()">obriši log</button>
    </div>
    <div class="log-box" id="log"></div>

    <div class="send-row">
      <input type="text" id="msg-input" placeholder='npr. {"type":"join","name":"Sibin"}' disabled />
      <button id="btn-send" onclick="sendMsg()" disabled>Pošalji</button>
    </div>
  </div>

  <script>
    let ws = null;

    function ts() {
      return new Date().toTimeString().slice(0, 8);
    }

    function log(msg, cls = '') {
      const box = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.innerHTML = `<span class="log-time">${ts()}</span><span class="log-msg ${cls}">${msg}</span>`;
      box.appendChild(entry);
      box.scrollTop = box.scrollHeight;
    }

    function setStatus(state, text) {
      const dot = document.getElementById('dot');
      const st = document.getElementById('status-text');
      dot.className = 'dot' + (state === 'connected' ? ' connected' : state === 'error' ? ' error' : '');
      st.textContent = text;
    }

    function connect() {
      const url = document.getElementById('url-input').value.trim();
      if (!url) return;

      log('Konekcija na: ' + url, 'sys');

      try {
        ws = new WebSocket(url);
      } catch (e) {
        log('Nevalidan URL: ' + e.message, 'err');
        return;
      }

      ws.onopen = () => {
        setStatus('connected', 'Konektovan — ' + url);
        log('Konekcija uspešna!', 'in');
        document.getElementById('btn-connect').disabled = true;
        document.getElementById('btn-disconnect').disabled = false;
        document.getElementById('msg-input').disabled = false;
        document.getElementById('btn-send').disabled = false;
      };

      ws.onmessage = (e) => {
        log('← ' + e.data, 'in');
      };

      ws.onerror = () => {
        setStatus('error', 'Greška pri konekciji');
        log('WebSocket greška — provjeri da li server radi', 'err');
      };

      ws.onclose = (e) => {
        setStatus('', 'Diskonektovan');
        log('Konekcija zatvorena (kod: ' + e.code + ')', 'sys');
        document.getElementById('btn-connect').disabled = false;
        document.getElementById('btn-disconnect').disabled = true;
        document.getElementById('msg-input').disabled = true;
        document.getElementById('btn-send').disabled = true;
        ws = null;
      };
    }

    function disconnect() {
      if (ws) { ws.close(); ws = null; }
    }

    function sendMsg() {
      const inp = document.getElementById('msg-input');
      const msg = inp.value.trim();
      if (!msg || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(msg);
      log('→ ' + msg, 'out');
      inp.value = '';
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    document.getElementById('msg-input').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMsg();
    });
  </script>
</body>
</html>
